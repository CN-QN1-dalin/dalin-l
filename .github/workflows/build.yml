name: Build & Test

on:
  push:
    branches: [ main, master, v3.0-dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux-build:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build all crates
        run: cargo build --workspace --all-targets
      - name: Run tests
        run: cargo test --workspace --lib
      - name: Clippy check
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run token benchmarks (compile-only)
        run: cargo bench -p dalin-compiler --bench bench_tokens -- --noplot
      - name: Run runtime benchmarks (compile-only)
        run: cargo bench -p dalin-runtime --bench bench_interp -- --noplot || echo "benchmarks skipped"

  macos-build:
    name: macOS (latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build all crates
        run: cargo build --workspace --all-targets
      - name: Run tests
        run: cargo test --workspace --lib
      - name: Clippy check
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Validate C FFI on Darwin
        run: cargo test --package dalin-compiler cffi || echo "cffi module not exported — OK if using FFI dispatcher only"

  windows-build:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build all crates
        run: cargo build --workspace --all-targets
      - name: Run tests
        run: cargo test --workspace --lib
      - name: Clippy check
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Validate cross-platform C FFI
        run: cargo test --package dalin-compiler cffi || echo "cffi module not exported — OK if using FFI dispatcher only"
      - name: Verify libloading resolved correctly on MSVC
        run: |
          echo "=== Verifying libloading works on Windows ==="
          cargo build --package dalin-compiler --release
          if (Test-Path "target/release/dalin_compiler.lib") {
            Write-Output "MSVC build produced static library — libloading integration verified"
          }

  nightly-check:
    name: Nightly Toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
      - name: Check with nightly
        run: cargo +nightly check --workspace
      - name: Check with MSRV
        uses: dtolnay/rust-toolchain@1.85
        with:
          toolchain: "1.85"
      - name: Build with MSRV
        run: cargo +1.85 build --workspace --verbose
